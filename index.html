<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ShiftBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f5f5f3;
  --bg2: #ffffff;
  --bg3: #f0f0ed;
  --border: #e0dfd8;
  --text: #1a1a18;
  --text2: #6b6b65;
  --text3: #b0afa8;
  --accent: #0284c7;
  --accent2: #0369a1;
  --danger: #dc2626;
  --warning: #d97706;
  --info: #2563eb;
  --success: #16a34a;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px;width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo-icon{font-size:2rem;color:var(--accent)}
.auth-logo h1{font-size:1.4rem;font-weight:700;color:var(--text)}
.auth-logo p{font-size:0.85rem;color:var(--text2);margin-top:4px}
.auth-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:6px;font-size:0.9rem;color:var(--text2);transition:all .2s}
.auth-tab.active{background:var(--bg2);color:var(--accent);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.role-card{border:2px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.role-card.selected{border-color:var(--accent);background:#eff6ff}
.role-card .role-name{font-weight:600;font-size:0.95rem}
.role-card .role-desc{font-size:0.78rem;color:var(--text2);margin-top:2px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.88rem;font-weight:500;margin-bottom:6px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.95rem;background:var(--bg);color:var(--text);transition:border .2s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg3)}
.btn-success{background:var(--success);color:#fff}
.btn-full{width:100%}
.auth-msg{padding:10px;border-radius:8px;font-size:0.88rem;margin-top:12px;display:none}
.auth-msg.error{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.auth-msg.success{background:#f0fdf4;color:var(--success);border:1px solid #bbf7d0}

#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-name{font-size:0.88rem;font-weight:500}
.topbar-role{font-size:0.72rem;font-weight:700;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;letter-spacing:0.5px}
.topbar-role.employee{background:var(--success)}
.topbar-role.viewing{background:var(--warning)}
.btn-logout{font-size:0.82rem;padding:6px 12px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:6px}
.bottom-nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100}
.nav-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-size:0.7rem;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:1.3rem}
.main-content{flex:1;overflow-y:auto;padding:16px}

.card{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:1rem;font-weight:700}
.card-body{padding:16px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:1rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{text-align:center;font-size:0.72rem;font-weight:600;color:var(--text2);padding:6px 0}
.cal-head:first-child{color:#ef4444}
.cal-head:last-child{color:#3b82f6}
.cal-day{border-radius:8px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:0.88rem;gap:2px;transition:background .15s}
.cal-day:hover{background:var(--bg3)}
.cal-day.today{background:#eff6ff;font-weight:700;color:var(--accent)}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.selected .dot{background:#fff}
.cal-day.other-month{color:var(--text3)}
.cal-day.sunday{color:#ef4444}
.cal-day.saturday{color:#3b82f6}
.cal-day.today.sunday,.cal-day.today.saturday{color:var(--accent)}
.cal-day.selected.sunday,.cal-day.selected.saturday{color:#fff}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

.shift-item{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.shift-item:hover{border-color:var(--accent);background:#eff6ff}
.shift-title{font-weight:600;font-size:0.95rem}
.shift-time{font-size:0.82rem;color:var(--text2);font-family:'DM Mono',monospace}
.shift-count{font-size:0.78rem;color:var(--text3)}
.shift-badge{display:inline-block;font-size:0.72rem;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:4px}
.shift-badge.applied{background:#dcfce7;color:var(--success)}
.shift-badge.full{background:#fef9c3;color:var(--warning)}

.members-table{width:100%;border-collapse:collapse}
.members-table th,.members-table td{padding:10px;text-align:left;border-bottom:1px solid var(--border);font-size:0.88rem}
.members-table th{color:var(--text2);font-weight:600}
.role-badge{display:inline-block;font-size:0.72rem;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:0.5px}
.role-badge.host{background:#dbeafe;color:#1d4ed8}
.role-badge.employee{background:#dcfce7;color:#15803d}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px;padding-bottom:40px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:1.1rem;font-weight:700}
.modal-close{background:transparent;border:none;font-size:1.4rem;color:var(--text2);cursor:pointer;line-height:1}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:0.9rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

.leave-item{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--border)}
.leave-item.pending{border-left-color:var(--warning)}
.leave-item.approved{border-left-color:var(--success)}
.leave-item.rejected{border-left-color:var(--danger)}
.leave-status{font-size:0.75rem;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.leave-status.pending{background:#fef9c3;color:var(--warning)}
.leave-status.approved{background:#dcfce7;color:var(--success)}
.leave-status.rejected{background:#fee2e2;color:var(--danger)}

.view-toggle{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:0.85rem}
.settings-section{background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:12px}
.settings-section h3{font-size:0.95rem;font-weight:700;margin-bottom:12px}
</style>
</head>
<body>
<div id="loading-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="font-size:2rem;color:var(--accent)">⬡</div>
  <div style="color:var(--text2)">読み込み中...</div>
</div>

<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⬡</div>
      <h1>ShiftBoard</h1>
      <p>シフト管理をシンプルに</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')" id="tab-login">ログイン</button>
      <button class="auth-tab" onclick="switchAuthTab('register')" id="tab-register">新規登録</button>
    </div>
    <div id="login-form">
      <div style="margin-bottom:16px">
        <div style="font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text2)">ログイン先を選択</div>
        <div class="role-select">
          <div class="role-card selected" id="login-role-host" onclick="selectLoginRole('host')">
            <div class="role-name">🏢 管理者</div>
            <div class="role-desc">シフト作成・管理</div>
          </div>
          <div class="role-card" id="login-role-employee" onclick="selectLoginRole('employee')">
            <div class="role-name">👤 従業員</div>
            <div class="role-desc">シフト応募・確認</div>
          </div>
        </div>
      </div>
      <div class="form-group"><label>メールアドレス</label><input type="email" id="login-email" placeholder="you@example.com"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">管理者としてログイン</button>
      <div class="auth-msg error" id="login-error"></div>
      <div class="auth-msg success" id="login-success"></div>
    </div>
    <div id="register-form" style="display:none">
      <div style="margin-bottom:16px">
        <div style="font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text2)">登録するロールを選択</div>
        <div class="role-select">
          <div class="role-card selected" id="reg-role-host" onclick="selectRegRole('host')">
            <div class="role-name">🏢 管理者</div>
            <div class="role-desc">シフト作成・管理</div>
          </div>
          <div class="role-card" id="reg-role-employee" onclick="selectRegRole('employee')">
            <div class="role-name">👤 従業員</div>
            <div class="role-desc">シフト応募・確認</div>
          </div>
        </div>
      </div>
      <div class="form-group"><label>お名前</label><input type="text" id="reg-name" placeholder="山田 太郎"></div>
      <div class="form-group"><label>メールアドレス</label><input type="email" id="reg-email" placeholder="you@example.com"></div>
      <div class="form-group"><label>パスワード（6文字以上）</label><input type="password" id="reg-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">従業員として登録</button>
      <div class="auth-msg error" id="reg-error"></div>
      <div class="auth-msg success" id="reg-success"></div>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="topbar-logo">⬡ ShiftBoard</div>
    <div class="topbar-user">
      <span class="topbar-name" id="topbar-name"></span>
      <span class="topbar-role" id="topbar-role"></span>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="main-content" id="main-content">
    <div class="view-toggle" id="view-toggle-bar" style="display:none">
      <span>👁️ 従業員ビューで閲覧中</span>
      <button class="btn btn-ghost" style="margin-left:auto;font-size:0.8rem;padding:4px 10px" onclick="exitEmployeeView()">管理者ビューに戻る</button>
    </div>
    <div id="page-content"></div>
  </div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal-box">
    <div id="modal-content"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://idydpopwmdzepinocgxy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkeWRwb3B3bWR6ZXBpbm9jZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzMzMzAsImV4cCI6MjA5MjEwOTMzMH0.ymlzcaro-uqRvqdVeLlUlOaK40xKByxwK54w6mSilKI';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let currentPage = 'calendar';
let currentMonth = new Date();
let shifts = [], applications = [], members = [], leaveRequests = [];
let selectedDate = null;
let loginRole = 'host';
let regRole = 'host';
let isViewingAsEmployee = false;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('loading-screen').style.display = 'none';
  if (session) { currentUser = session.user; await loadUserAndShow(); }
  else { showAuth(); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) { currentUser = session.user; await loadUserAndShow(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; currentProfile = null; showAuth(); }
  });
}

async function loadUserAndShow() {
  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = profile;
  if (!profile) { showAuth(); return; }
  showApp();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const app = document.getElementById('app-screen');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  app.style.minHeight = '100vh';
  updateTopbar();
  renderNav();
  loadData().then(() => renderPage());
}

function updateTopbar() {
  document.getElementById('topbar-name').textContent = currentProfile.name || '';
  const rb = document.getElementById('topbar-role');
  if (isViewingAsEmployee) { rb.textContent = 'VIEWING'; rb.className = 'topbar-role viewing'; }
  else if (currentProfile.role === 'host') { rb.textContent = 'HOST'; rb.className = 'topbar-role'; }
  else { rb.textContent = 'STAFF'; rb.className = 'topbar-role employee'; }
}

function selectLoginRole(role) {
  loginRole = role;
  document.querySelectorAll('#login-form .role-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('login-role-' + role).classList.add('selected');
  document.getElementById('login-btn').textContent = role === 'host' ? '管理者としてログイン' : '従業員としてログイン';
}

function selectRegRole(role) {
  regRole = role;
  document.querySelectorAll('#register-form .role-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('reg-role-' + role).classList.add('selected');
  document.getElementById('reg-btn').textContent = role === 'host' ? '管理者として登録' : '従業員として登録';
}

function switchAuthTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  clearAuthMessages();
}

function clearAuthMessages() {
  ['login-error','login-success','reg-error','reg-success'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.textContent = ''; }
  });
}

function showAuthError(id, msg) { const el = document.getElementById(id); if(el){el.textContent=msg;el.style.display='block';} }
function showAuthSuccess(id, msg) { const el = document.getElementById(id); if(el){el.textContent=msg;el.style.display='block';} }

async function doLogin() {
  clearAuthMessages();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showAuthError('login-error','メールとパスワードを入力してください'); return; }
  const btn = document.getElementById('login-btn');
  btn.textContent = 'ログイン中...'; btn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; selectLoginRole(loginRole);
  if (error) { showAuthError('login-error', error.message); return; }
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  if (profile && loginRole === 'host' && profile.role !== 'host') {
    showAuthError('login-error','このアカウントは管理者ではありません');
    await sb.auth.signOut(); return;
  }
  if (profile && loginRole === 'employee' && profile.role === 'host') {
    showAuthError('login-error','管理者アカウントです。管理者でログインしてください。');
    await sb.auth.signOut(); return;
  }
}

async function doRegister() {
  clearAuthMessages();
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showAuthError('reg-error','全項目を入力してください'); return; }
  if (pass.length < 6) { showAuthError('reg-error','パスワードは6文字以上です'); return; }
  const btn = document.getElementById('reg-btn');
  btn.textContent = '登録中...'; btn.disabled = true;
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  btn.disabled = false; selectRegRole(regRole);
  if (error) { showAuthError('reg-error', error.message); return; }
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, email, name, role: regRole });
    showAuthSuccess('reg-success','登録完了！ログインしてください');
    setTimeout(() => switchAuthTab('login'), 1500);
  }
}

async function doLogout() { isViewingAsEmployee = false; await sb.auth.signOut(); }

async function loadData() {
  await Promise.all([loadShifts(), loadApplications(), loadMembers(), loadLeaveRequests()]);
}

async function loadShifts() {
  const { data } = await sb.from('shifts').select('*').order('date').order('start_time');
  shifts = data || [];
}

async function loadApplications() {
  const { data } = await sb.from('applications').select('*');
  applications = data || [];
}

async function loadMembers() {
  if (currentProfile.role === 'host') {
    const { data } = await sb.from('profiles').select('*').order('name');
    members = data || [];
  }
}

async function loadLeaveRequests() {
  try {
    if (currentProfile.role === 'host') {
      const { data, error } = await sb.from('leave_requests').select('*, profiles(name,email)').order('created_at',{ascending:false});
      if (!error) leaveRequests = data || [];
    } else {
      const { data, error } = await sb.from('leave_requests').select('*').eq('user_id', currentUser.id).order('created_at',{ascending:false});
      if (!error) leaveRequests = data || [];
    }
  } catch(e) { leaveRequests = []; }
}

function renderNav() {
  const nav = document.getElementById('bottom-nav');
  const isHost = currentProfile.role === 'host' && !isViewingAsEmployee;
  if (isHost) {
    nav.innerHTML = `
      <button class="nav-btn ${currentPage==='calendar'?'active':''}" onclick="switchPage('calendar')"><span class="nav-icon">📅</span><span>カレンダー</span></button>
      <button class="nav-btn ${currentPage==='shifts'?'active':''}" onclick="switchPage('shifts')"><span class="nav-icon">📋</span><span>シフト管理</span></button>
      <button class="nav-btn ${currentPage==='members'?'active':''}" onclick="switchPage('members')"><span class="nav-icon">👥</span><span>スタッフ</span></button>
      <button class="nav-btn ${currentPage==='leave_admin'?'active':''}" onclick="switchPage('leave_admin')"><span class="nav-icon">📝</span><span>申請管理</span></button>
      <button class="nav-btn ${currentPage==='share'?'active':''}" onclick="switchPage('share')"><span class="nav-icon">🔗</span><span>配布</span></button>
      <button class="nav-btn ${currentPage==='settings'?'active':''}" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span><span>設定</span></button>
    `;
  } else {
    nav.innerHTML = `
      <button class="nav-btn ${currentPage==='calendar'?'active':''}" onclick="switchPage('calendar')"><span class="nav-icon">📅</span><span>カレンダー</span></button>
      <button class="nav-btn ${currentPage==='my_shifts'?'active':''}" onclick="switchPage('my_shifts')"><span class="nav-icon">🗓️</span><span>マイシフト</span></button>
      <button class="nav-btn ${currentPage==='apply'?'active':''}" onclick="switchPage('apply')"><span class="nav-icon">✋</span><span>希望提出</span></button>
      <button class="nav-btn ${currentPage==='leave'?'active':''}" onclick="switchPage('leave')"><span class="nav-icon">🌿</span><span>休暇申請</span></button>

}

function switchPage(page) {
  currentPage = page;
  renderNav();
  renderPage();
}

function renderPage() {
  document.getElementById('view-toggle-bar').style.display = isViewingAsEmployee ? 'flex' : 'none';
  const c = document.getElementById('page-content');
  const map = {
    calendar: renderCalendarPage,
    shifts: renderShiftsPage,
    members: renderMembersPage,
    my_shifts: renderMyShiftsPage,
    apply: renderApplyPage,
    leave: renderLeavePage,
    leave_admin: renderLeaveAdminPage,
    share: renderSharePage,
    settings: renderSettingsPage
  };
  c.innerHTML = (map[currentPage] || renderCalendarPage)();
}

function viewAsEmployee() { isViewingAsEmployee = true; currentPage = 'calendar'; updateTopbar(); renderNav(); renderPage(); }
function exitEmployeeView() { isViewingAsEmployee = false; currentPage = 'calendar'; updateTopbar(); renderNav(); renderPage(); }

function renderCalendarPage() {
  const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
  const isHost = currentProfile.role === 'host' && !isViewingAsEmployee;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const headers = ['日','月','火','水','木','金','土'].map(d=>`<div class="cal-head">${d}</div>`).join('');
  let cells = '';
  for (let i=0; i<firstDay; i++) {
    const d = new Date(year, month, -firstDay+i+1);
    cells += `<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for (let d=1; d<=daysInMonth; d++) {
    const ds = toDateStr(new Date(year,month,d));
    const dayShifts = shifts.filter(s=>s.date===ds);
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const isSel = selectedDate===ds;
    const dow = new Date(year,month,d).getDay();
    const cls = ['cal-day', isToday?'today':'', isSel?'selected':'', dow===0?'sunday':dow===6?'saturday':''].filter(Boolean).join(' ');
    const dots = dayShifts.slice(0,3).map(()=>`<div class="dot"></div>`).join('');
    cells += `<div class="${cls}" onclick="selectDay('${ds}')">${d}${dots?`<div style="display:flex;gap:2px">${dots}</div>`:''}</div>`;
  }
  const rem = (firstDay+daysInMonth)%7;
  if (rem>0) for(let i=1;i<=7-rem;i++) cells+=`<div class="cal-day other-month">${i}</div>`;

  let selSection = '';
  if (selectedDate) {
    const ds = shifts.filter(s=>s.date===selectedDate);
    const items = ds.length ? ds.map(s=>{
      const applied = applications.some(a=>a.shift_id===s.id&&a.user_id===currentUser.id);
      const cnt = applications.filter(a=>a.shift_id===s.id).length;
      return `<div class="shift-item" onclick="openShiftDetail('${s.id}')">
        <div class="shift-title">${s.title||'無題'}</div>
        <div class="shift-time">${s.start_time}〜${s.end_time}</div>
        <div class="shift-count">応募 ${cnt}/${s.needed_count||1}人</div>
        ${applied?'<span class="shift-badge applied">応募済</span>':(cnt>=(s.needed_count||1)?'<span class="shift-badge full">満員</span>':'')}
      </div>`;
    }).join('') : '<div style="color:var(--text3);text-align:center;padding:20px">この日のシフトはありません</div>';
    selSection = `<div class="card"><div class="card-header"><div class="card-title">${selectedDate} のシフト</div>${isHost?`<button class="btn btn-primary" style="padding:6px 14px;font-size:0.85rem" onclick="openAddShiftModal()">＋ 追加</button>`:''}</div><div class="card-body">${items}</div></div>`;
  }
  return `<div class="card"><div class="card-body"><div class="cal-nav"><button class="btn btn-ghost" onclick="changeMonth(-1)" style="padding:6px 12px">‹</button><div class="cal-month">${year}年 ${month+1}月</div><button class="btn btn-ghost" onclick="changeMonth(1)" style="padding:6px 12px">›</button></div><div class="cal-grid">${headers}${cells}</div></div></div>${selSection}`;
}

function changeMonth(d) { currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+d, 1); renderPage(); }
function selectDay(ds) { selectedDate = selectedDate===ds ? null : ds; renderPage(); }

function renderShiftsPage() {
  const sorted = [...shifts].sort((a,b)=>(a.date+a.start_time).localeCompare(b.date+b.start_time));
  const items = sorted.map(s=>{
    const cnt = applications.filter(a=>a.shift_id===s.id).length;
    return `<div class="shift-item" onclick="openShiftDetail('${s.id}')">
      <div class="shift-title">${s.title||'無題'} <span style="color:var(--text3);font-size:0.82rem">${s.date}</span></div>
      <div class="shift-time">${s.start_time}〜${s.end_time}</div>
      <div class="shift-count">応募 ${cnt}/${s.needed_count||1}人</div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-header"><div class="card-title">シフト一覧</div><button class="btn btn-primary" style="padding:6px 14px;font-size:0.85rem" onclick="openAddShiftModal()">＋ シフト追加</button></div><div class="card-body">${items||'<div style="color:var(--text3);text-align:center;padding:20px">シフトがありません</div>'}</div></div>`;

function renderMyShiftsPage() {
  const myApps = applications.filter(a=>a.user_id===currentUser.id);
  const myShifts = myApps.map(a=>shifts.find(s=>s.id===a.shift_id)).filter(Boolean);
  const sorted = [...myShifts].sort((a,b)=>(a.date+a.start_time).localeCompare(b.date+b.start_time));
  const items = sorted.map(s=>`<div class="shift-item">
    <div class="shift-title">${s.title||'無題'} <span style="color:var(--text3);font-size:0.82rem">${s.date}</span></div>
    <div class="shift-time">${s.start_time}〜${s.end_time}</div>
    ${s.note?'<div style="font-size:0.82rem;color:var(--text2);margin-top:4px">'+s.note+'</div>':''}
  </div>`).join('');
  return `<div class="card"><div class="card-header"><div class="card-title">マイシフト</div></div><div class="card-body">${items||'<div style="color:var(--text3);text-align:center;padding:20px">応募済みシフトはありません</div>'}</div></div>`;
}

function renderApplyPage() {
  const today = toDateStr(new Date());
  const upcoming = [...shifts].filter(s=>s.date>=today).sort((a,b)=>(a.date+a.start_time).localeCompare(b.date+b.start_time));
  const items = upcoming.map(s=>{
    const applied = applications.some(a=>a.shift_id===s.id&&a.user_id===currentUser.id);
    const cnt = applications.filter(a=>a.shift_id===s.id).length;
    const full = cnt>=(s.needed_count||1)&&!applied;
    return `<div class="shift-item" onclick="openShiftDetail('${s.id}')">
      <div class="shift-title">${s.title||'無題'} <span style="color:var(--text3);font-size:0.82rem">${s.date}</span></div>
      <div class="shift-time">${s.start_time}〜${s.end_time}</div>
      <div class="shift-count">応募 ${cnt}/${s.needed_count||1}人</div>
      ${applied?'<span class="shift-badge applied">応募済</span>':full?'<span class="shift-badge full">満員</span>':''}
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-header"><div class="card-title">シフト希望を提出</div></div><div class="card-body">${items||'<div style="color:var(--text3);text-align:center;padding:20px">応募できるシフトはありません</div>'}</div></div>`;
}

function renderLeaveAdminPage() {
  const pending = leaveRequests.filter(r=>r.status==='pending');
  const others = leaveRequests.filter(r=>r.status!=='pending');
  const item = r => `<div class="leave-item ${r.status}">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span class="leave-status ${r.status}">${r.status==='pending'?'審査中':r.status==='approved'?'承認済':'却下'}</span>
      ${r.status==='pending'?`<div style="display:flex;gap:4px"><button class="btn btn-success" style="font-size:0.78rem;padding:4px 10px" onclick="processLeave('${r.id}','approved')">承認</button><button class="btn btn-danger" style="font-size:0.78rem;padding:4px 10px" onclick="processLeave('${r.id}','rejected')">却下</button></div>`:''}
    </div>
    <div style="font-weight:600">${r.profiles?.name||'-'} - ${r.type}</div>
    <div style="font-size:0.82rem;color:var(--text2)">${r.start_date} 〜 ${r.end_date}</div>
    ${r.reason?'<div style="font-size:0.82rem;margin-top:4px">'+r.reason+'</div>':''}
  </div>`;
  let html = '';
  if (pending.length) html += '<div style="font-weight:600;margin-bottom:8px;color:var(--warning)">⏳ 審査待ち ('+pending.length+'件)</div>'+pending.map(item).join('');
  if (others.length) html += '<div style="font-weight:600;margin:12px 0 8px;color:var(--text2)">処理済み</div>'+others.map(item).join('');
  if (!leaveRequests.length) html = '<div style="color:var(--text3);text-align:center;padding:20px">申請はありません</div>';
  return `<div class="card"><div class="card-header"><div class="card-title">申請管理</div></div><div class="card-body">${html}</div></div>`;
}

async function updateProfile() {
  const name = document.getElementById('set-name')?.value?.trim();
  if (!name) { toast('名前を入力してください'); return; }
  const { error } = await sb.from('profiles').update({ name }).eq('id', currentUser.id);
  if (error) { toast('エラー: '+error.message); return; }
  currentProfile.name = name;
  document.getElementById('topbar-name').textContent = name;
  toast('名前を更新しました');
}

async function updateEmail() {
  const email = document.getElementById('set-email')?.value?.trim();
  if (!email) { toast('メールアドレスを入力してください'); return; }
  const { error } = await sb.auth.updateUser({ email });
  if (error) { toast('エラー: '+error.message); return; }
  await sb.from('profiles').update({ email }).eq('id', currentUser.id);
  toast('確認メールを送信しました');
}

async function updatePassword() {
  const pass = document.getElementById('set-pass')?.value;
  const pass2 = document.getElementById('set-pass2')?.value;
  if (!pass || !pass2) { toast('パスワードを入力してください'); return; }
  if (pass !== pass2) { toast('パスワードが一致しません'); return; }
  if (pass.length < 6) { toast('6文字以上入力してください'); return; }
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) { toast('エラー: '+error.message); return; }
  toast('パスワードを変更しました');
  document.getElementById('set-pass').value = '';
  document.getElementById('set-pass2').value = '';
}

function openModal(html) { document.getElementById('modal-content').innerHTML=html; document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOnOverlay(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function openAddShiftModal() {
  const dv = selectedDate || toDateStr(new Date());
  openModal(`<div class="modal-header"><div class="modal-title">シフトを追加</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-group"><label>タイトル（任意）</label><input type="text" id="m-title" placeholder="例：早番、遅番"></div>
    <div class="form-group"><label>日付</label><input type="date" id="m-date" value="${dv}"></div>
    <div class="form-group"><label>開始時間</label><input type="time" id="m-start" value="09:00"></div>
    <div class="form-group"><label>終了時間</label><input type="time" id="m-end" value="17:00"></div>
    <div class="form-group"><label>必要人数</label><input type="number" id="m-count" value="1" min="1"></div>
    <div class="form-group"><label>メモ（任意）</label><textarea id="m-note" placeholder="備考など"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="saveShift()">保存</button></div>
  `);
}

async function saveShift() {
  const title = document.getElementById('m-title')?.value?.trim()||'';
  const date = document.getElementById('m-date')?.value;
  const start_time = document.getElementById('m-start')?.value;
  const end_time = document.getElementById('m-end')?.value;
  const needed_count = parseInt(document.getElementById('m-count')?.value)||1;
  const note = document.getElementById('m-note')?.value?.trim()||'';
  if (!date||!start_time||!end_time) { toast('日付と時間を入力してください'); return; }
  const { error } = await sb.from('shifts').insert({ title, date, start_time, end_time, needed_count, note, created_by: currentUser.id });
  if (error) { toast('エラー: '+error.message); return; }
  closeModal(); await loadShifts(); renderPage(); toast('シフトを追加しました');
}

async function openShiftDetail(shiftId) {
  const s = shifts.find(s=>s.id===shiftId);
  if (!s) return;
  const applied = applications.some(a=>a.shift_id===shiftId&&a.user_id===currentUser.id);
  const appsForShift = applications.filter(a=>a.shift_id===shiftId);
  const cnt = appsForShift.length;
  const isHost = currentProfile.role==='host'&&!isViewingAsEmployee;
  const full = cnt>=(s.needed_count||1);
  let names = '';
  if (isHost && members.length) {
    const ns = appsForShift.map(a=>{const m=members.find(m=>m.id===a.user_id);return m?m.name||m.email:'不明';}).join('、');
    if (ns) names = `<div style="font-size:0.85rem;color:var(--text2);margin-top:8px">応募者: ${ns}</div>`;
  }
  openModal(`<div class="modal-header"><div class="modal-title">シフト詳細</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px">
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">${s.title||'無題'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:0.95rem">${s.date} ${s.start_time}〜${s.end_time}</div>
      <div style="font-size:0.85rem;color:var(--text2);margin-top:4px">必要人数: ${s.needed_count||1}人 / 応募: ${cnt}人</div>
      ${s.note?'<div style="font-size:0.85rem;margin-top:8px">'+s.note+'</div>':''}
      ${names}
    </div>
    <div style="display:flex;gap:8px;flex-direction:column">
      ${isHost
        ? '<button class="btn btn-danger" onclick="deleteShiftFromModal(''+s.id+'')">🗑️ シフトを削除</button>'
        : applied
          ? '<button class="btn btn-ghost" onclick="cancelShiftFromModal(''+s.id+'')">応募を取り消す</button>'
          : full
            ? '<button class="btn btn-ghost" disabled style="opacity:0.5">満員です</button>'
            : '<button class="btn btn-primary" onclick="applyShiftFromModal(''+s.id+'')">このシフトに応募する</button>'
      }
      <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
    </div>
  `);
}

async function applyShiftFromModal(id) {
  const { error } = await sb.from('applications').insert({ shift_id:id, user_id:currentUser.id });
  if (error) { toast('エラー: '+error.message); return; }
  closeModal(); await loadApplications(); renderPage(); toast('応募しました');
}

async function cancelShiftFromModal(id) {
  const { error } = await sb.from('applications').delete().eq('shift_id',id).eq('user_id',currentUser.id);
  if (error) { toast('エラー: '+error.message); return; }
  closeModal(); await loadApplications(); renderPage(); toast('応募を取り消しました');
}

async function deleteShiftFromModal(id) {
  if (!confirm('このシフトを削除しますか？')) return;
  await sb.from('applications').delete().eq('shift_id',id);
  const { error } = await sb.from('shifts').delete().eq('id',id);
  if (error) { toast('エラー: '+error.message); return; }
  closeModal(); await loadShifts(); await loadApplications(); renderPage(); toast('シフトを削除しました');
}

async function toggleRole(userId, cur) {
  const nr = cur==='host'?'employee':'host';
  if (!confirm(`ロールを${nr==='host'?'管理者':'従業員'}に変更しますか？`)) return;
  const { error } = await sb.from('profiles').update({ role:nr }).eq('id',userId);
  if (error) { toast('エラー: '+error.message); return; }
  await loadMembers(); renderPage(); toast('ロールを変更しました');
}

function openLeaveRequestModal() {
  openModal(`<div class="modal-header"><div class="modal-title">休暇・有給申請</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-group"><label>申請種別</label><select id="m-leave-type">
      <option value="有給休暇">有給休暇</option>
      <option value="半日有給">半日有給</option>
      <option value="育児休暇">育児休暇</option>
      <option value="介護休暇">介護休暇</option>
      <option value="病気休暇">病気休暇</option>
      <option value="特別休暇">特別休暇</option>
      <option value="その他">その他</option>
    </select></div>
    <div class="form-group"><label>開始日</label><input type="date" id="m-leave-start" value="${toDateStr(new Date())}"></div>
    <div class="form-group"><label>終了日</label><input type="date" id="m-leave-end" value="${toDateStr(new Date())}"></div>
    <div class="form-group"><label>申請理由</label><textarea id="m-leave-reason" placeholder="申請理由を入力してください"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="submitLeaveRequest()">申請する</button></div>
  `);
}

async function submitLeaveRequest() {
  const type = document.getElementById('m-leave-type')?.value;
  const start_date = document.getElementById('m-leave-start')?.value;
  const end_date = document.getElementById('m-leave-end')?.value;
  const reason = document.getElementById('m-leave-reason')?.value?.trim();
  if (!start_date||!end_date) { toast('日付を入力してください'); return; }
  if (end_date<start_date) { toast('終了日は開始日以降にしてください'); return; }
  const { error } = await sb.from('leave_requests').insert({ user_id:currentUser.id, type, start_date, end_date, reason, status:'pending' });
  if (error) { toast('エラー: '+error.message); return; }
  closeModal(); await loadLeaveRequests(); renderPage(); toast('申請を送信しました');
}

async function processLeave(id, status) {
  if (!confirm(`この申請を${status==='approved'?'承認':'却下'}しますか？`)) return;
  const { error } = await sb.from('leave_requests').update({ status }).eq('id',id);
  if (error) { toast('エラー: '+error.message); return; }
  await loadLeaveRequests(); renderPage(); toast(`申請を${status==='approved'?'承認':'却下'}しました`);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

init();
</script>
</body>
</html>
